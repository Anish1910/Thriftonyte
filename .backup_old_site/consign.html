<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consign - BONZERO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="bg-amber-50">
    <nav class="bg-white sticky top-0 z-50" id="navbar">
        <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex justify-between items-center">
            <h1 class="text-2xl font-bold text-green-900">BONZERO</h1>
            <div class="flex gap-6">
                <a href="index.html" class="text-gray-700 hover:text-green-900 transition">Home</a>
                <a href="about.html" class="text-gray-700 hover:text-green-900 transition">About</a>
                <a href="curations.html" class="text-gray-700 hover:text-green-900 transition">Curations</a>
                <a href="learn.html" class="text-gray-700 hover:text-green-900 transition">Learn</a>
                <a href="consign.html" class="text-gray-700 hover:text-green-900 transition">Consign</a>
                <a href="contact.html" class="text-gray-700 hover:text-green-900 transition">Contact</a>
            </div>
        </div>
    </nav>

    <section class="bg-gradient-to-b from-amber-100 to-white py-20 md:py-32">
        <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 text-center">
            <h1 class="text-5xl md:text-6xl font-bold mb-6 font-serif text-gray-900" style="animation: slideUp 0.8s ease-out;">Consign with BONZERO</h1>
            <p class="text-xl text-gray-700" style="animation: slideUp 0.8s ease-out 0.2s both;">Give your clothes a second life and earn money.</p>
        </div>
    </section>

    <section class="max-w-2xl mx-auto px-4 sm:px-6 lg:px-8 py-16">
        <div class="form-card bg-white p-8 rounded-xl border border-gray-200">
            <form id="consign-form">
                <div class="space-y-6">
                    <div class="form-group grid grid-cols-1 md:grid-cols-2 gap-4" style="animation-delay: 0s;">
                        <div>
                            <label class="block text-sm font-semibold text-gray-900 mb-2">Your Name</label>
                            <input type="text" name="name" required class="w-full px-4 py-3 rounded-lg" placeholder="John Doe">
                            <div class="progress-indicator"><div class="progress-fill"></div></div>
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-gray-900 mb-2">Email</label>
                            <input type="email" name="email" required class="w-full px-4 py-3 rounded-lg" placeholder="john@example.com">
                            <div class="progress-indicator"><div class="progress-fill"></div></div>
                        </div>
                    </div>

                    <div class="form-group" style="animation-delay: 0.08s;">
                        <label class="block text-sm font-semibold text-gray-900 mb-2">Phone Number</label>
                        <input type="tel" name="phone" required class="w-full px-4 py-3 rounded-lg" placeholder="+1 (555) 000-0000">
                        <div class="progress-indicator"><div class="progress-fill"></div></div>
                    </div>

                    <div class="form-group" style="animation-delay: 0.16s;">
                        <label class="block text-sm font-semibold text-gray-900 mb-2">Item Category</label>
                        <select name="category" required class="w-full px-4 py-3 rounded-lg">
                            <option value="">Select a category...</option>
                            <option value="vintage">Vintage</option>
                            <option value="designer">Designer</option>
                            <option value="luxury">Luxury</option>
                            <option value="contemporary">Contemporary</option>
                        </select>
                        <div class="progress-indicator"><div class="progress-fill"></div></div>
                    </div>

                    <div class="form-group" style="animation-delay: 0.24s;">
                        <label class="block text-sm font-semibold text-gray-900 mb-2">Item Condition</label>
                        <select name="condition" required class="w-full px-4 py-3 rounded-lg">
                            <option value="">Select condition...</option>
                            <option value="new">Like New</option>
                            <option value="excellent">Excellent</option>
                            <option value="good">Good</option>
                            <option value="fair">Fair</option>
                        </select>
                        <div class="progress-indicator"><div class="progress-fill"></div></div>
                    </div>

                    <div class="form-group" style="animation-delay: 0.32s;">
                        <label class="block text-sm font-semibold text-gray-900 mb-2">Item Description</label>
                        <textarea name="description" rows="5" required class="w-full px-4 py-3 rounded-lg" placeholder="Describe the item, brand, size, material..."></textarea>
                        <div class="progress-indicator"><div class="progress-fill"></div></div>
                    </div>

                    <div class="form-group" style="animation-delay: 0.4s;">
                        <button type="submit" class="w-full btn-submit text-white py-3 rounded-lg font-semibold text-lg">
                            Submit Application
                        </button>
                    </div>
                </div>
            </form>

            <div id="success-message" class="hidden mt-8 p-6 bg-green-50 border-2 border-green-900 rounded-xl text-center" style="animation: slideUp 0.6s ease-out;">
                <h3 class="text-2xl font-bold text-green-900 mb-2">Application Submitted! ✓</h3>
                <p class="text-gray-700">We'll review your items and get back to you within 48 hours.</p>
            </div>
        </div>
    </section>

    <footer class="bg-gray-900 text-white py-12">
        <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 text-center">
            <p>&copy; 2024 BONZERO. All rights reserved.</p>
        </div>
    </footer>

    <!-- External Scripts -->
    <script src="js/data.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
